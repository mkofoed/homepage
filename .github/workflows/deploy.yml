name: Deploy to VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Log in to GHCR
      uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3

    - name: Build and push
      uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
      with:
        context: .
        file: ./Dockerfile.prod
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/homepage-web:latest
          ghcr.io/${{ github.repository_owner }}/homepage-web:${{ github.sha }}
        build-args: |
          MAXMIND_LICENSE_KEY=${{ secrets.MAXMIND_LICENSE_KEY }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/homepage-web:buildcache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/homepage-web:buildcache,mode=max

  deploy:
    needs: build
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment: production
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - name: Upload files to server
      uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "docker-compose.prod.yml,deploy.sh,rollback.sh,nginx/"
        target: ~/homepage
        overwrite: true

    - name: Deploy to VM
      uses: appleboy/ssh-action@90162d1e4396c5c4b7671d60cae550a8b1ae1d0b # master
      env:
        ENV_FILE: ${{ secrets.ENV_FILE }}
        IMAGE_TAG: ${{ github.sha }}
      with:
        host: ${{ secrets.DROPLET_IP }}
        username: ${{ secrets.DROPLET_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: ENV_FILE,IMAGE_TAG
        script: |
          cd ~/homepage
          chmod +x deploy.sh rollback.sh
          install -m 600 /dev/null .env
          printf '%s' "$ENV_FILE" > .env
          sed -i 's/\r$//' .env
          sed -i '/^$/d; /^#/d' .env
          export IMAGE_TAG="$IMAGE_TAG"
          ./deploy.sh
