{% extends "core/base.html" %}
{% load static %}

{% block title %}API Docs — {{ title|default:"MKofoed.dev" }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ swagger_ui_css }}">
<style>
  /* Remove swagger's own topbar — we use the site nav */
  .swagger-ui .topbar { display: none !important; }

  /* Swagger wrapper fits inside the page container */
  #swagger-ui-container {
    padding: 1.5rem 0 3rem;
  }

  /* ── Design tokens for Swagger ── */
  .swagger-ui { background: transparent; }
  .swagger-ui .wrapper { padding: 0; max-width: 100%; }

  /* Info block */
  .swagger-ui .info { margin: 0 0 24px; }
  .swagger-ui .info .title { color: var(--ds-text-primary) !important; font-family: var(--ds-font-body); font-weight: 700; }
  .swagger-ui .info .title small.version-stamp { background: rgba(34,211,238,0.1); color: var(--ds-accent); border: 1px solid rgba(34,211,238,0.25); border-radius: 4px; }
  .swagger-ui .info li, .swagger-ui .info p, .swagger-ui .info table { color: var(--ds-text-secondary) !important; }
  .swagger-ui .info a { color: var(--ds-accent) !important; }
  .swagger-ui .scheme-container { background: var(--ds-surface) !important; border: 1px solid var(--ds-border) !important; border-radius: 8px; box-shadow: none; padding: 16px; }

  /* Tag headers */
  .swagger-ui .opblock-tag { border-bottom: 1px solid var(--ds-border) !important; color: var(--ds-text-primary) !important; }
  .swagger-ui .opblock-tag:hover { background: var(--ds-surface) !important; border-radius: 6px; }
  .swagger-ui .opblock-tag small { color: var(--ds-text-muted) !important; }

  /* Operation blocks */
  .swagger-ui .opblock {
    background: var(--ds-surface) !important;
    border: 1px solid var(--ds-border) !important;
    border-radius: 8px !important;
    margin-bottom: 8px !important;
    box-shadow: none !important;
  }
  .swagger-ui .opblock.opblock-get    { border-left: 3px solid #22d3ee !important; background: rgba(34,211,238,0.03) !important; }
  .swagger-ui .opblock.opblock-post   { border-left: 3px solid #10b981 !important; background: rgba(16,185,129,0.03) !important; }
  .swagger-ui .opblock.opblock-put    { border-left: 3px solid #f59e0b !important; background: rgba(245,158,11,0.03) !important; }
  .swagger-ui .opblock.opblock-delete { border-left: 3px solid #ef4444 !important; background: rgba(239,68,68,0.03) !important; }
  .swagger-ui .opblock.opblock-patch  { border-left: 3px solid #a78bfa !important; background: rgba(167,139,250,0.03) !important; }

  /* Method badges */
  .swagger-ui .opblock-summary-method { border-radius: 4px !important; font-family: var(--ds-font-code) !important; font-size: 12px !important; font-weight: 700 !important; min-width: 60px !important; text-align: center !important; }
  .swagger-ui .opblock.opblock-get    .opblock-summary-method { background: #22d3ee !important; color: #0a0e17 !important; }
  .swagger-ui .opblock.opblock-post   .opblock-summary-method { background: #10b981 !important; color: #0a0e17 !important; }
  .swagger-ui .opblock.opblock-put    .opblock-summary-method { background: #f59e0b !important; color: #0a0e17 !important; }
  .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: #ef4444 !important; color: #fff !important; }
  .swagger-ui .opblock.opblock-patch  .opblock-summary-method { background: #a78bfa !important; color: #0a0e17 !important; }

  .swagger-ui .opblock-summary-path { color: var(--ds-text-primary) !important; font-family: var(--ds-font-code) !important; }
  .swagger-ui .opblock-summary-description { color: var(--ds-text-muted) !important; }
  .swagger-ui .opblock-summary { border-bottom: 1px solid var(--ds-border) !important; }
  .swagger-ui .opblock-body { background: var(--ds-bg) !important; }
  .swagger-ui .opblock .opblock-section-header { background: var(--ds-surface) !important; border-bottom: 1px solid var(--ds-border) !important; }
  .swagger-ui .opblock .opblock-section-header h4 { color: var(--ds-text-secondary) !important; }
  .swagger-ui .opblock-description-wrapper p { color: var(--ds-text-secondary) !important; }

  /* Parameters */
  .swagger-ui table thead tr td, .swagger-ui table thead tr th { border-bottom: 1px solid var(--ds-border) !important; color: var(--ds-text-muted) !important; }
  .swagger-ui .parameter__name { color: var(--ds-text-primary) !important; font-family: var(--ds-font-code) !important; }
  .swagger-ui .parameter__type { color: var(--ds-accent) !important; font-family: var(--ds-font-code) !important; font-size: 12px !important; }
  .swagger-ui .parameter__in { color: var(--ds-text-muted) !important; }

  /* Inputs */
  .swagger-ui input[type=text], .swagger-ui input[type=password], .swagger-ui textarea, .swagger-ui select {
    background: var(--ds-surface) !important; border: 1px solid var(--ds-border) !important;
    color: var(--ds-text-primary) !important; border-radius: 6px !important; font-family: var(--ds-font-code) !important;
  }
  .swagger-ui input[type=text]:focus, .swagger-ui textarea:focus { border-color: var(--ds-accent) !important; }

  /* Buttons */
  .swagger-ui .btn { border-radius: 6px !important; font-family: var(--ds-font-body) !important; font-weight: 600 !important; }
  .swagger-ui .btn.execute { background: var(--ds-accent) !important; border-color: var(--ds-accent) !important; color: #0a0e17 !important; }
  .swagger-ui .btn.execute:hover { background: #06b6d4 !important; }
  .swagger-ui .btn.cancel { background: transparent !important; border: 1px solid var(--ds-border) !important; color: var(--ds-text-secondary) !important; }
  .swagger-ui .btn.authorize { color: var(--ds-accent) !important; border-color: var(--ds-accent) !important; }
  .swagger-ui .btn.authorize svg { fill: var(--ds-accent) !important; }

  /* Responses */
  .swagger-ui .response-col_status { color: var(--ds-text-primary) !important; font-family: var(--ds-font-code) !important; }
  .swagger-ui .live-responses-table .response .response-col_status { color: var(--ds-accent) !important; }
  .swagger-ui .highlight-code { background: var(--ds-bg) !important; border-radius: 6px !important; border: 1px solid var(--ds-border) !important; }
  .swagger-ui .microlight { font-family: var(--ds-font-code) !important; font-size: 13px !important; }

  /* Models */
  .swagger-ui section.models { border: 1px solid var(--ds-border) !important; border-radius: 8px !important; background: var(--ds-surface) !important; }
  .swagger-ui section.models h4 { color: var(--ds-text-primary) !important; }
  .swagger-ui .model-box { background: var(--ds-surface) !important; border-radius: 6px !important; }
  .swagger-ui .model { color: var(--ds-text-secondary) !important; font-family: var(--ds-font-code) !important; }

  /* Authorize modal */
  .swagger-ui .dialog-ux .modal-ux { background: var(--ds-surface) !important; border: 1px solid var(--ds-border) !important; border-radius: 12px !important; }
  .swagger-ui .dialog-ux .modal-ux-header { border-bottom: 1px solid var(--ds-border) !important; background: var(--ds-surface) !important; }
  .swagger-ui .dialog-ux .modal-ux-header h3 { color: var(--ds-text-primary) !important; }
  .swagger-ui .dialog-ux .modal-ux-content p { color: var(--ds-text-secondary) !important; }

  /* Misc */
  .swagger-ui svg.arrow { fill: var(--ds-text-muted) !important; }
  .swagger-ui a { color: var(--ds-accent) !important; }
  .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5 { color: var(--ds-text-secondary) !important; }
</style>
{% endblock %}

{% block content %}
<div id="swagger-ui-container">
  <div id="swagger-ui"></div>
</div>
<script src="{{ swagger_ui_bundle }}"></script>
<script src="{{ swagger_ui_standalone }}"></script>
{% if script_url %}
<script src="{{ script_url }}"></script>
{% else %}
<script>
{% include template_name_js %}
</script>
{% endif %}
{% endblock %}
