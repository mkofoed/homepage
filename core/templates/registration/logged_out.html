{% extends 'core/base.html' %}

{% block title %}Logged Out - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="mx-auto mt-12 max-w-lg text-center">
    <div class="ds-card">
        <i class="bi bi-check-circle-fill text-5xl" style="color: var(--ds-success);" aria-hidden="true"></i>
        <h1 class="mt-4 text-2xl font-bold">Signed out</h1>
        <p class="mt-2 ds-text-secondary">You have been signed out.</p>
        <div class="mt-6 flex flex-wrap justify-center gap-3">
            <a href="{% url 'home' %}" class="ds-btn-outline"><i class="bi bi-house me-2" aria-hidden="true"></i>Home</a>
            <a href="{% url 'login' %}" class="ds-btn-primary"><i class="bi bi-box-arrow-in-right me-2" aria-hidden="true"></i>Sign in again</a>
        </div>
    </div>
</section>
{% endblock %}
