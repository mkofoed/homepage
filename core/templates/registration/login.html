{% extends 'core/base.html' %}

{% block title %}Login - {{ SITE_NAME }}{% endblock %}

{% block content %}
<section class="mx-auto mt-12 max-w-md">
    <div class="ds-card">
        <header class="mb-6 text-center">
            <i class="bi bi-person-circle text-4xl" style="color: var(--ds-accent);" aria-hidden="true"></i>
            <h1 class="mt-3 text-2xl font-bold">Sign in</h1>
            <p class="mt-1 text-sm ds-text-secondary">Use your account to access private metrics.</p>
        </header>
                {% if form.errors %}
                <div role="alert" class="mb-4 rounded-lg border p-3 text-sm" style="border-color: var(--ds-danger); color: var(--ds-danger);">
                    <i class="bi bi-exclamation-triangle-fill me-2" aria-hidden="true"></i>
                    Invalid username or password. Please try again.
                </div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="id_username" class="mb-2 block text-sm font-medium ds-text-secondary">
                            <i class="bi bi-person me-1"></i>Username
                        </label>
                        <input type="text" name="username" id="id_username"
                            class="ds-input"
                            placeholder="Enter your username" autocomplete="username" autofocus required>
                    </div>

                    <div class="mb-6">
                        <label for="id_password" class="mb-2 block text-sm font-medium ds-text-secondary">
                            <i class="bi bi-lock me-1"></i>Password
                        </label>
                        <input type="password" name="password" id="id_password"
                            class="ds-input"
                            placeholder="Enter your password" autocomplete="current-password" required>
                    </div>

                    <input type="hidden" name="next" value="{{ next }}">

                    <div>
                        <button type="submit" class="ds-btn-primary w-full">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Log In
                        </button>
                    </div>
                </form>
    </div>
</section>
{% endblock %}
