{% extends "core/base.html" %}

{% block title %}Electricity Prices Dashboard - MKofoed.dev{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
    window.chartResolution = 'hour';
    window.chartRange = 'day';
    window.chartOffset = 0;
    window.priceArea = '{{ active_area|default:"DK1" }}';  // Use active_area from context

    function loadChart() {
        var res = window.chartResolution || 'hour';
        var range = window.chartRange || 'day';
        var offset = window.chartOffset || 0;
        var area = window.priceArea || 'DK1';
        var url = '{% url "dashboard:htmx_price_chart" %}?range=' + range + '&resolution=' + res + '&offset=' + offset + "&area=" + area;
        htmx.ajax('GET', url, {target: '#chart-area', swap: 'innerHTML'});
    }

    function setArea(area) {
        window.priceArea = area;
        document.querySelectorAll('.area-radio').forEach(function(r) { r.checked = (r.value === area); });
        loadChart();
        htmx.ajax('GET', '{% url "dashboard:htmx_hero_card" %}?area=' + area, {
            target: '#hero-card-container',
            swap: 'innerHTML'
        });
    }

    function setRange(range, btn) {
        window.chartRange = range;
        window.chartOffset = 0;  // Reset to current period when switching ranges
        document.querySelectorAll('.zoom-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        loadChart();
    }

    function navigate(direction) {
        window.chartOffset += direction;
        loadChart();
    }
</script>
<style>
    .area-switch {
        display: flex;
        align-items: center;
        gap: 1rem;
        justify-content: center;
        margin-bottom: 1.5rem;
    }
    .area-switch__label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
    }
    .area-switch__input { display: none; }
    .area-switch__button {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        border: 1px solid var(--ds-border, #334155);
        background: var(--ds-surface, #1e293b);
        font-size: 1rem;
        font-weight: 500;
        color: var(--ds-text-secondary, #94a3b8);
        cursor: pointer;
        transition: all 150ms;
    }
    .area-switch__input:checked + .area-switch__button {
        background: var(--ds-accent, #22d3ee);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="ds-text-primary fw-bold">Real-Time Electricity Dashboard</h1>
            <p class="lead ds-text-secondary">Aarhus (DK1)  Updates every 60s</p>
        </div>
    </div>

    <!-- Area Switcher -->
    <div class="area-switch">
        <label class="area-switch__label">
            <input type="radio" name="area" class="area-switch__input area-radio" value="DK1" {% if active_area == "DK1" %}checked{% endif %}
                   onchange="setArea('DK1')"
                   hx-get="{% url 'dashboard:htmx_price_chart' %}?area=DK1"
                   hx-target="#chart-area"
                   hx-swap="innerHTML">
            <span class="area-switch__button">DK1 (Vest)</span>
        </label>
        <label class="area-switch__label">
            <input type="radio" name="area" class="area-switch__input area-radio" value="DK2" {% if active_area == "DK2" %}checked{% endif %}
                   onchange="setArea('DK2')"
                   hx-get="{% url 'dashboard:htmx_price_chart' %}?area=DK2"
                   hx-target="#chart-area"
                   hx-swap="innerHTML">
            <span class="area-switch__button">DK2 (Øst)</span>
        </label>
    </div>

    <!-- Current Price Hero Card -->
    <div id="hero-card-container"
         hx-get="{% url 'dashboard:htmx_hero_card' %}?area={{ active_area|default:'DK1' }}"
         hx-trigger="load, every 60s"
         hx-swap="innerHTML"
         class="mb-4">
        <div class="ds-card text-center py-4">
            <p class="ds-text-secondary mb-0">Loading current price Updated every 60 sec</p>
        </div>
</div>
</div>
{% endblock %}
