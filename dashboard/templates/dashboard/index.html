{% extends "core/base.html" %}

{% block title %}Elpris Dashboard - MKofoed.dev{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
    window.chartResolution = 'hour';
    window.chartRange = 'day';
    window.chartOffset = 0;
    window.priceArea = '{{ active_area|default:"DK1" }}';

    function loadChart() {
        var res = window.chartResolution || 'hour';
        var range = window.chartRange || 'day';
        var offset = window.chartOffset || 0;
        var area = window.priceArea || 'DK1';
        var url = '{% url "dashboard:htmx_price_chart" %}?range=' + range + '&resolution=' + res + '&offset=' + offset + '&area=' + area;
        htmx.ajax('GET', url, {target: '#chart-area', swap: 'innerHTML'});
    }

    function setArea(area) {
        window.priceArea = area;
        document.querySelectorAll('.area-radio').forEach(function(r) { r.checked = (r.value === area); });
        var names = {DK1: 'DK Vest', DK2: 'DK \u00d8st'};
        var sub = document.getElementById('area-subtitle');
        if (sub) sub.textContent = (names[area] || area) + ' \u00b7 Opdateres hvert minut';
        loadChart();
        htmx.ajax('GET', '{% url "dashboard:htmx_hero_card" %}?area=' + area, {
            target: '#hero-card-container',
            swap: 'innerHTML'
        });
    }

    function setRange(range, btn) {
        window.chartRange = range;
        window.chartOffset = 0;
        document.querySelectorAll('.zoom-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        loadChart();
    }

    function navigate(direction) {
        window.chartOffset += direction;
        loadChart();
    }
</script>
<style>
    .area-switch {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        justify-content: center;
    }
    .area-switch__label {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
    }
    .area-switch__input { display: none; }
    .area-switch__button {
        display: inline-block;
        padding: 0.35rem 1rem;
        border-radius: var(--ds-radius-md, 8px);
        border: 1px solid var(--ds-border, #1e2d40);
        background: var(--ds-surface, #111827);
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--ds-text-secondary, #94a3b8);
        cursor: pointer;
        transition: all 150ms;
    }
    .area-switch__input:checked + .area-switch__button {
        background: var(--ds-accent, #22d3ee);
        color: #0a0e17;
        border-color: var(--ds-accent, #22d3ee);
        box-shadow: 0 0 12px rgba(34, 211, 238, 0.3);
    }
    /* Chart controls */
    .chart-controls {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.75rem;
    }
    .chart-controls__ranges {
        display: flex;
        gap: 0.25rem;
    }
    .chart-controls__nav {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    .zoom-btn, .nav-btn {
        padding: 0.3rem 0.75rem;
        border-radius: var(--ds-radius-sm, 4px);
        border: 1px solid var(--ds-border, #1e2d40);
        background: var(--ds-surface, #111827);
        color: var(--ds-text-secondary, #94a3b8);
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 150ms;
    }
    .zoom-btn:hover, .nav-btn:hover {
        border-color: var(--ds-accent, #22d3ee);
        color: var(--ds-text-primary, #f1f5f9);
    }
    .zoom-btn.active {
        background: var(--ds-accent, #22d3ee);
        color: #0a0e17;
        border-color: var(--ds-accent, #22d3ee);
    }
    .nav-btn {
        font-size: 1rem;
        padding: 0.2rem 0.6rem;
        line-height: 1;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="text-center mb-3">
        <h1 class="fw-bold mb-1" style="font-size: 2rem;">Elpris Dashboard</h1>
        <p id="area-subtitle" class="ds-text-secondary mb-0" style="font-size: 0.95rem;">DK Vest &middot; Opdateres hvert minut</p>
    </div>

    <!-- Area Switcher -->
    <div class="area-switch mb-4">
        <label class="area-switch__label">
            <input type="radio" name="area" class="area-switch__input area-radio" value="DK1" {% if active_area == "DK1" %}checked{% endif %}
                   onchange="setArea('DK1')">
            <span class="area-switch__button">DK1 (Vest)</span>
        </label>
        <label class="area-switch__label">
            <input type="radio" name="area" class="area-switch__input area-radio" value="DK2" {% if active_area == "DK2" %}checked{% endif %}
                   onchange="setArea('DK2')">
            <span class="area-switch__button">DK2 (&Oslash;st)</span>
        </label>
    </div>

    <!-- Current Price Hero Card -->
    <div id="hero-card-container"
         hx-get="{% url 'dashboard:htmx_hero_card' %}?area={{ active_area|default:'DK1' }}"
         hx-trigger="load, every 60s"
         hx-swap="innerHTML"
         class="mb-3">
        <div class="ds-card text-center py-4">
            <p class="ds-text-secondary mb-0">Henter aktuel pris&hellip;</p>
        </div>
    </div>

    <!-- Time Controls -->
    <div class="chart-controls mb-3">
        <div class="chart-controls__ranges">
            <button class="zoom-btn active" onclick="setRange('day', this)">Dag</button>
            <button class="zoom-btn" onclick="setRange('week', this)">Uge</button>
            <button class="zoom-btn" onclick="setRange('month', this)">M&aring;ned</button>
            <button class="zoom-btn" onclick="setRange('year', this)">&Aring;r</button>
        </div>
        <div class="chart-controls__nav">
            <button class="nav-btn" onclick="navigate(-1)" title="Forrige">&larr;</button>
            <span id="period-label" class="ds-text-secondary" style="font-size: 0.85rem; min-width: 120px; text-align: center;">I dag</span>
            <button class="nav-btn" onclick="navigate(1)" title="N&aelig;ste">&rarr;</button>
        </div>
    </div>

    <!-- Chart Area -->
    <div id="chart-area"
         hx-get="{% url 'dashboard:htmx_price_chart' %}?area={{ active_area|default:'DK1' }}"
         hx-trigger="load"
         hx-swap="innerHTML">
        <div class="ds-card text-center py-4">
            <p class="ds-text-secondary mb-0">Henter graf&hellip;</p>
        </div>
    </div>
</div>
{% endblock %}
