{% extends "core/base.html" %}

{% block title %}Electricity Prices Dashboard - MKofoed.dev{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row mb-5">
        <div class="col-12 text-center">
            <h1 class="ds-text-primary fw-bold">Real-Time Electricity Dashboard</h1>
            <p class="lead ds-text-secondary">Aarhus (DK1) Spot Prices - Updates every 60s</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <!-- Chart Column -->
        <div class="col-12">
            <div class="ds-surface ds-card ds-radius-lg shadow-lg border-0 mb-4 p-4 reveal">
                <div
                    class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0 fw-semibold"><i class="bi bi-graph-up-arrow me-2 ds-accent"></i>Stacked Price
                        Components (DKK/kWh)</h5>

                    <div class="btn-group btn-group-sm" role="group">
                        <button id="btn-zoom-day" class="ds-btn-outline zoom-btn"
                            hx-get="{% url 'dashboard:htmx_price_chart' %}?range=day"
                            hx-target="#chart-scripts">1D</button>
                        <button id="btn-zoom-week" class="ds-btn-outline zoom-btn active"
                            hx-get="{% url 'dashboard:htmx_price_chart' %}?range=week"
                            hx-target="#chart-scripts">1W</button>
                        <button id="btn-zoom-month" class="ds-btn-outline zoom-btn"
                            hx-get="{% url 'dashboard:htmx_price_chart' %}?range=month"
                            hx-target="#chart-scripts">1M</button>
                        <button id="btn-zoom-year" class="ds-btn-outline zoom-btn"
                            hx-get="{% url 'dashboard:htmx_price_chart' %}?range=year"
                            hx-target="#chart-scripts">1Y</button>
                    </div>

                    <div id="chart-indicator" class="htmx-indicator spinner-border spinner-border-sm ds-accent"
                        role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <div class="" style="position: relative; height: 70vh; width: 100%;">
                    <!-- 
                        HTMX will GET the configured chart data every 60 seconds.
                        The response is a block of Javascript that updates this canvas.
                    -->
                    <canvas id="priceChart" hx-get="{% url 'dashboard:htmx_price_chart' %}?range=default"
                        hx-trigger="load, every 60s" hx-indicator="#chart-indicator">
                    </canvas>
                    <div id="chart-scripts"></div> <!-- HTMX will swap script tags in here -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Page specific styles -->
<style>
    .chart-tooltip {
        background: rgba(var(--ds-surface), 0.9);
        color: var(--ds-text-primary);
        border: 1px solid var(--ds-border);
    }
</style>

<!-- Include Chart.js and Plugins -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom/dist/chartjs-plugin-zoom.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<script>
    const ctx = document.getElementById('priceChart').getContext('2d');

    window.priceChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                {
                    label: 'Spotpris',
                    data: [],
                    backgroundColor: 'var(--ds-accent)', // Updated colors
                },
                {
                    label: 'Netselskab',
                    data: [],
                    backgroundColor: '#10b981', // Green
                },
                {
                    label: 'Forsyningstilsynet',
                    data: [],
                    backgroundColor: '#fd7e14', // Amber
                },
                {
                    label: 'Elafgift',
                    data: [],
                    backgroundColor: '#ef4444', // Red
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: 'var(--ds-text-secondary)' }
                },
                tooltip: {
                    backgroundColor: 'var(--ds-surface)',
                    bodyColor: 'var(--ds-text-primary)',
                }
            }
        }
    });
</script>
{% endblock content %}
