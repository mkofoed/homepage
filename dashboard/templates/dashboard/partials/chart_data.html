<!-- Summary cards -->
<div class="summary-cards mb-4">
    <div class="summary-card summary-card--low" id="summary-min"></div>
    <div class="summary-card summary-card--high" id="summary-max"></div>
    <div class="summary-card summary-card--avg" id="summary-avg"></div>
</div>

<!-- Chart -->
<div style="position: relative; height: 400px;">
    <canvas id="priceChart"></canvas>
</div>

<script>
(function () {
    var style = getComputedStyle(document.documentElement);
    var getCSSVar = function(name) { return style.getPropertyValue(name).trim() || name; };

    var data = JSON.parse('{{ chart_data_json|escapejs }}');
    var summary = JSON.parse('{{ summary_json|escapejs }}');
    var currentIntervalIso = '{{ current_interval_iso }}';
    var activeRange = '{{ active_range }}';

    // Colors — 2-tone like Danish energy providers
    var colorElpris = getCSSVar('--ds-accent') || '#22d3ee';
    var colorTransport = '#1e293b';  // Dark, subtle — like the provider's black bars
    var colorHighlight = getCSSVar('--ds-success') || '#10b981';

    // Populate summary cards
    var minEl = document.getElementById('summary-min');
    var maxEl = document.getElementById('summary-max');
    var avgEl = document.getElementById('summary-avg');

    if (summary.min_price) {
        minEl.innerHTML = '<div class="summary-card__label">Laveste pris ↓</div>' +
            '<div class="summary-card__price">' + Number(summary.min_price).toFixed(2).replace('.', ',') + ' kr</div>' +
            '<div class="summary-card__sub">' + summary.min_hour + '</div>';
        maxEl.innerHTML = '<div class="summary-card__label">Højeste pris ↑</div>' +
            '<div class="summary-card__price">' + Number(summary.max_price).toFixed(2).replace('.', ',') + ' kr</div>' +
            '<div class="summary-card__sub">' + summary.max_hour + '</div>';
        avgEl.innerHTML = '<div class="summary-card__label">Gennemsnit</div>' +
            '<div class="summary-card__price">' + Number(summary.avg_price).toFixed(2).replace('.', ',') + ' kr</div>' +
            '<div class="summary-card__sub">Hele perioden</div>';
    }

    // Find "now" bar
    var nowMs = new Date(currentIntervalIso).getTime();
    var nowIndex = -1;
    var closestDiff = Infinity;
    data.labels.forEach(function(label, i) {
        var labelMs = new Date(label).getTime();
        var diff = nowMs - labelMs;
        if (diff >= 0 && diff < closestDiff) {
            closestDiff = diff;
            nowIndex = i;
        }
    });

    // Highlight "now" in elpris dataset
    var elprisBg = data.data_elpris.map(function(v, i) {
        return i === nowIndex ? colorHighlight : colorElpris;
    });

    // Transport bars: use a visible dark color with border
    var transportBorder = 'rgba(255,255,255,0.1)';

    // Time scale config per range
    var timeUnit, displayFormat;
    if (activeRange === 'year') {
        timeUnit = 'month';
        displayFormat = { month: 'MMM yyyy', day: 'dd MMM' };
    } else if (activeRange === 'month') {
        timeUnit = 'day';
        displayFormat = { day: 'dd MMM', hour: 'HH:mm' };
    } else if (activeRange === 'week') {
        timeUnit = 'day';
        displayFormat = { day: 'EEE dd/MM', hour: 'HH:mm' };
    } else {
        timeUnit = 'hour';
        displayFormat = { hour: 'HH:mm', minute: 'HH:mm' };
    }

    var chartConfig = {
        type: 'bar',
        data: {
            labels: data.labels.map(function(l) { return new Date(l); }),
            datasets: [
                {
                    label: 'Elpris',
                    data: data.data_elpris,
                    backgroundColor: elprisBg,
                    borderWidth: 0,
                    order: 2,
                },
                {
                    label: 'Transport & afgifter',
                    data: data.data_transport,
                    backgroundColor: 'rgba(100, 116, 139, 0.6)',
                    borderColor: transportBorder,
                    borderWidth: 0.5,
                    order: 1,
                },
            ],
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    labels: {
                        color: getCSSVar('--ds-text-secondary') || '#94a3b8',
                        font: { size: 12 },
                        usePointStyle: true,
                        pointStyle: 'rect',
                    },
                },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.95)',
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1,
                    titleColor: '#f1f5f9',
                    bodyColor: '#cbd5e1',
                    footerColor: getCSSVar('--ds-accent') || '#22d3ee',
                    footerFont: { weight: 'bold', size: 14 },
                    padding: 12,
                    callbacks: {
                        title: function(items) {
                            if (!items.length) return '';
                            var raw = items[0].parsed.x;
                            var d = new Date(raw);
                            if (isNaN(d.getTime())) return '';
                            var h = d.getHours();
                            return d.toLocaleDateString('da-DK', { weekday: 'short', day: 'numeric', month: 'short' }) +
                                ' kl. ' + String(h).padStart(2,'0') + '-' + String((h+1)%24).padStart(2,'0');
                        },
                        label: function(item) {
                            return '  ' + item.dataset.label + ': ' + item.parsed.y.toFixed(2).replace('.', ',') + ' kr';
                        },
                        footer: function(items) {
                            var total = items.reduce(function(s, i) { return s + i.parsed.y; }, 0);
                            return 'Total: ' + total.toFixed(2).replace('.', ',') + ' kr/kWh';
                        },
                    },
                },
            },
            scales: {
                x: {
                    stacked: true,
                    type: 'time',
                    time: {
                        unit: timeUnit,
                        displayFormats: displayFormat,
                    },
                    ticks: {
                        color: getCSSVar('--ds-text-muted') || '#64748b',
                        maxRotation: 0,
                        autoSkip: true,
                        maxTicksLimit: 24,
                    },
                    grid: { color: 'rgba(255,255,255,0.03)' },
                },
                y: {
                    stacked: true,
                    beginAtZero: true,
                    ticks: {
                        color: getCSSVar('--ds-text-muted') || '#64748b',
                        callback: function(value) { return value.toFixed(1).replace('.', ',') + ' kr'; },
                    },
                    grid: { color: 'rgba(255,255,255,0.05)' },
                },
            },
        },
    };

    // Destroy old chart, create new
    if (window.priceChart && typeof window.priceChart.destroy === 'function') {
        window.priceChart.destroy();
    }
    window.priceChart = null;

    var canvas = document.getElementById('priceChart');
    if (canvas) {
        window.priceChart = new Chart(canvas.getContext('2d'), chartConfig);
    }

    // Show/hide resolution toggle
    var resToggle = document.getElementById('res-toggle');
    if (resToggle) {
        resToggle.style.display = (activeRange === 'day') ? '' : 'none';
    }

    // Update period label
    var periodLabel = '{{ period_label|escapejs }}';
    var labelEl = document.getElementById('period-label');
    if (labelEl && periodLabel) {
        labelEl.textContent = periodLabel;
    }
})();
</script>
